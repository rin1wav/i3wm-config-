backend = "xrender";
vsync = true;

shadow = false;
shadow-radius = 5;
shadow-offset-x = -3;
shadow-offset-y = -3;
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

inactive-opacity = 0.92;
active-opacity = 1.0;

opacity-rule = [
  "90:class_g = 'Alacritty'",
  "90:class_g = 'kitty'",
  "90:class_g = 'URxvt'"
];
corner-radius = 10;
round-borders = 0.5;
rounded-corners-exclude = [
    "! (class_g = 'Alacritty')"
];
